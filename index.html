<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://d369cipp2c.execute-api.us-east-1.amazonaws.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <!-- Standard favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="award-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="award-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="award-64.png">
  <link rel="icon" type="image/png" sizes="128x128" href="award-128.png">

  <!-- High-res icons for Chrome / Android -->
  <link rel="icon" type="image/png" sizes="192x192" href="award-256.png">
  <link rel="icon" type="image/png" sizes="512x512" href="award-512.png">

  <!-- Optional but recommended -->
  <link rel="apple-touch-icon" sizes="180x180" href="award-128.png">

  <!-- Manifest (important for Chrome homepage tiles) -->
  <link rel="manifest" href="site.webmanifest">

  <meta name="theme-color" content="#ffffff">
  <title>WC2026 Predictor</title>
  <style>
    .filter-fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      left: auto;
      /* remove the centering */
      transform: none;
      /* remove translateX */
      z-index: 300;
      pointer-events: none;
    }

    .filter-fab-btn {
      pointer-events: all;
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-fab-btn .fab-accent {
      color: #5ddb7c;
      font-size: 0.75rem;
    }

    .filter-sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      visibility: hidden;
    }

    .filter-sheet-overlay.open {
      opacity: 1;
      pointer-events: all;
      visibility: visible;
    }

    .filter-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 16px 16px 0 0;
      z-index: 500;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.34, 1.1, 0.64, 1);
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }

    .filter-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(0, 0, 0, 0.12);
      border-radius: 2px;
      margin: 12px auto 16px;
    }

    .sheet-title {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink4);
      padding: 0 20px 10px;
    }

    .sheet-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-top: 1px solid var(--rule);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .sheet-item:active {
      background: var(--paper);
    }

    .sheet-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sheet-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--rule-strong);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .sheet-dot.active {
      background: #5ddb7c;
    }

    .sheet-item-name {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .sheet-item-name.active {
      color: var(--green);
    }

    .sheet-check {
      color: #5ddb7c;
      font-size: 1rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .sheet-check.active {
      opacity: 1;
    }

    .sheet-hint {
      font-family: Barlow, sans-serif;
      font-size: 0.72rem;
      color: var(--ink4);
      padding: 10px 20px 16px;
      border-top: 1px solid var(--rule);
      font-style: italic;
    }

    :root {
      --paper: #f5f0e8;
      --paper2: #ede8df;
      --paper3: #e4ddd1;
      --ink: #0e0e0e;
      --ink2: #3a3730;
      --ink3: #45403a;
      --ink4: #6e6760;
      --green: #1a5c2a;
      --green-light: #e8f0ea;
      --green-mid: #c2d9c7;
      --red: #c0392b;
      --red-light: #fbecea;
      --gold: #b8860b;
      --gold-light: #fdf6e3;
      --blue: #1a3a6b;
      --rule: rgba(14, 14, 14, 0.12);
      --rule-strong: rgba(14, 14, 14, 0.25);
      --radius: 4px;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: Barlow, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    header {
      background: var(--ink);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo-main {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 900;
      font-size: 1.45rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }

    .logo-main span {
      color: #5ddb7c;
    }

    .logo-sub {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      padding-bottom: 2px;
    }

    .sync-btn {
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 7px 16px;
      border-radius: var(--radius);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
    }

    .sync-btn:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    .sync-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .sync-icon {
      font-size: 0.85rem;
      display: inline-block;
    }

    .sync-btn.spinning .sync-icon {
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tabs-wrapper {
      background: var(--ink);
      display: flex;
      padding: 0 28px;
    }

    .sticky-shell {
      position: sticky;
      top: 0;
      z-index: 200;
      will-change: transform;
      isolation: isolate;
    }

    .tab {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      padding: 13px 20px 11px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .tab:hover {
      color: rgba(255, 255, 255, 0.65);
    }

    .tab.active {
      color: #5ddb7c;
      border-bottom-color: #5ddb7c;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 24px 100px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stage-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 40px 0 16px;
    }

    .stage-header:first-child {
      margin-top: 0;
    }

    .stage-label {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink3);
      white-space: nowrap;
    }

    .stage-rule {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .match-card {
      background: #fff;
      border: 1.5px solid var(--rule);
      border-radius: var(--radius);
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    @media(hover:hover) {
      .match-card:hover {
        border-color: #5ddb7c;
        box-shadow: 0 0 0 3px rgba(93, 219, 124, 0.13), 0 4px 20px rgba(0, 0, 0, 0.06);
      }
    }

    .match-card.open {
      border-color: #5ddb7c;
      box-shadow: 0 0 0 3px rgba(93, 219, 124, 0.13), 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .match-row {
      display: grid;
      grid-template-columns: 1fr 130px 1fr;
      align-items: stretch;
      min-height: 72px;
    }

    .team-cell {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      min-width: 0;
      overflow: hidden;
    }

    .team-cell.home {
      justify-content: center;
      border-right: 1px solid var(--rule);
    }

    .team-cell.away {
      justify-content: center;
      border-left: 1px solid var(--rule);
    }

    .team-name {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1.1;
      color: var(--ink);
    }

    .team-cell.home .team-name {
      text-align: center;
    }

    .centre-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      gap: 5px;
      background: var(--paper);
      transition: background 0.18s;
    }

    .match-card.open .centre-block {
      background: var(--green-light);
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .score-num {
      color: var(--ink);
      min-width: 26px;
      text-align: center;
    }

    .score-num.final {
      color: var(--green);
    }

    .score-num.pending {
      color: var(--ink3);
      font-size: 1.4rem;
      font-weight: 400;
    }

    .score-dash {
      color: var(--ink3);
      font-weight: 400;
      font-size: 1.6rem;
      padding: 0 2px;
    }

    .match-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .badge {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .badge.upcoming {
      background: var(--paper3);
      color: var(--ink2);
    }

    .badge.finished {
      background: var(--green-light);
      color: var(--green);
    }

    .badge.live {
      background: var(--red-light);
      color: var(--red);
      animation: blink 1.4s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .match-time {
      font-family: Barlow, sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink3);
      letter-spacing: 0.03em;
    }

    .predictions-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.22s ease;
      background: var(--paper);
      overflow: hidden;
    }

    .predictions-panel-inner {
      overflow: hidden;
      padding: 0 20px;
      transition: padding 0.22s ease;
    }

    .match-card.open .predictions-panel {
      grid-template-rows: 1fr;
      border-top: 1px solid var(--rule);
    }

    .match-card.open .predictions-panel-inner {
      padding: 14px 20px;
    }

    .pred-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      justify-items: stretch;
    }

    .pred-item {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .pred-item:hover {
      border-color: var(--rule-strong);
    }

    .pred-name {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pred-score-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pred-input {
      width: 42px;
      height: 40px;
      background: var(--paper);
      border: 1px solid var(--rule-strong);
      border-radius: var(--radius);
      color: var(--ink);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -moz-appearance: textfield;
    }

    .pred-input::-webkit-outer-spin-button,
    .pred-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .pred-input:focus {
      border-color: var(--green);
      background: var(--green-light);
    }

    .pred-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      border-color: transparent;
    }

    .pred-sep {
      color: var(--ink3);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .points-pill {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      align-self: flex-start;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .points-pill.p3 {
      background: var(--green-light);
      color: var(--green);
    }

    .points-pill.p1 {
      background: #e8eef8;
      color: var(--blue);
    }

    .points-pill.p0 {
      background: var(--red-light);
      color: var(--red);
    }

    .points-pill.pnd {
      background: var(--paper2);
      color: var(--ink4);
    }

    .lb-wrap {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .lb-title-row {
      padding: 20px 24px 16px;
      border-bottom: 2px solid var(--ink);
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .lb-title {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1;
    }

    .lb-sub {
      font-family: "Instrument Serif", serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink4);
    }

    .lb-header-row {
      display: grid;
      grid-template-columns: 56px 1fr 80px 56px 60px;
      padding: 8px 24px;
      background: var(--paper2);
      border-bottom: 1px solid var(--rule);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
    }

    .lb-header-row div:not(:first-child):not(:nth-child(2)) {
      text-align: center;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 56px 1fr 80px 56px 60px;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--rule);
      transition: background 0.15s;
    }

    .lb-row:last-child {
      border-bottom: none;
    }

    .lb-row:hover {
      background: var(--paper);
    }

    .lb-row.top1 {
      background: var(--gold-light);
    }

    .lb-row.top1:hover {
      background: #fdf2d0;
    }

    .rank-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rank-num {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      line-height: 1;
    }

    .rank-num.r1 {
      color: var(--gold);
      font-size: 1.6rem;
    }

    .rank-num.r2 {
      color: var(--ink2);
    }

    .rank-num.r3 {
      color: #a0522d;
    }

    .rank-num.rn {
      color: var(--ink3);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .lb-name-cell {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .lb-name {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-row.top1 .lb-name {
      color: var(--gold);
    }

    .lb-pts {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--green);
      text-align: center;
      line-height: 1;
    }

    .lb-num {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      color: var(--ink2);
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }

      100% {
        background-position: 1000px 0;
      }
    }

    .skel {
      background: linear-gradient(90deg, var(--paper2) 25%, var(--paper3) 50%, var(--paper2) 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.8s infinite linear;
      border-radius: 3px;
    }

    .skel-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      margin-bottom: 6px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 72px;
    }

    .sk-team {
      height: 16px;
      width: 100px;
    }

    .sk-score {
      height: 40px;
      width: 100px;
      border-radius: 3px;
    }

    .sk-meta {
      height: 10px;
      width: 70px;
      margin-top: 6px;
    }

    .sk-lb-row {
      display: grid;
      grid-template-columns: 56px 1fr 80px 56px 60px;
      align-items: center;
      padding: 14px 24px;
      gap: 8px;
      border-bottom: 1px solid var(--rule);
    }

    .sk-rank {
      height: 22px;
      width: 28px;
      margin: 0 auto;
    }

    .sk-name {
      height: 16px;
      width: 140px;
    }

    .sk-pts {
      height: 22px;
      width: 44px;
      margin: 0 auto;
    }

    .sk-stat {
      height: 14px;
      width: 28px;
      margin: 0 auto;
    }

    .state-msg {
      text-align: center;
      color: var(--ink3);
      padding: 60px 20px;
      font-family: "Instrument Serif", serif;
      font-style: italic;
      font-size: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--ink);
      color: #fff;
      border-left: 3px solid #5ddb7c;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
    }

    .toast.error {
      border-left-color: var(--red);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .rules-box {
      margin-top: 12px;
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 20px 24px 22px;
    }

    .rules-title {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 12px;
    }

    .rules-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 4px;
    }

    .rules-table thead th {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink4);
      padding: 0 0 6px;
      text-align: left;
      border-bottom: 1px solid var(--rule);
    }

    .rules-table thead th.pts-col {
      text-align: center;
      width: 64px;
    }

    .rules-table tbody td {
      font-family: Barlow, sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--ink2);
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
    }

    .rules-table tbody tr:last-child td {
      border-bottom: none;
    }

    .pts-col {
      text-align: center;
      width: 64px;
    }

    .green-pts {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 800;
      color: var(--green);
      font-size: 1rem;
    }

    .blue-pts {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 800;
      color: var(--blue);
      font-size: 1rem;
    }

    .grey-pts {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 800;
      color: var(--ink4);
      font-size: 1rem;
    }

    .rules-divider {
      height: 1px;
      background: var(--rule);
      margin: 14px 0;
    }

    .rules-sub {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
    }

    .rules-list {
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .rules-list li {
      font-family: Barlow, sans-serif;
      font-size: 0.88rem;
      color: var(--ink2);
    }

    .rules-list-item {
      font-family: Barlow, sans-serif;
      font-size: 0.88rem;
      color: var(--ink2);
      line-height: 1.5;
    }

    .rules-list-item strong {
      font-weight: 600;
      color: var(--ink);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .match-card.new-card {
      animation: slideUp 0.38s ease both;
      will-change: transform;
    }

    .lb-wrap {
      animation: slideUp 0.35s ease both;
    }

    @media(max-width:560px) {
      .header-top {
        padding: 0 16px;
        height: 54px;
      }

      .logo-main {
        font-size: 1.2rem;
      }

      .logo-sub {
        font-size: 0.85rem;
      }

      .tab {
        padding: 11px 14px 9px;
        font-size: 0.88rem;
      }

      main {
        padding: 24px 14px 100px;
      }

      .team-name {
        font-size: 0.9rem;
        max-width: 100%;
      }

      .team-cell {
        padding: 12px 12px;
      }

      .match-row {
        grid-template-columns: 1fr 106px 1fr;
      }

      .centre-block {
        min-width: 0;
        padding: 10px 6px;
      }

      .score-display {
        font-size: 1.6rem;
      }

      .lb-header-row,
      .lb-row {
        grid-template-columns: 44px 1fr 64px 44px 48px;
        padding: 12px 14px;
      }

      .lb-pts {
        font-size: 1.2rem;
      }

      .lb-name {
        font-size: 0.9rem;
      }

      .sk-lb-row {
        grid-template-columns: 44px 1fr 64px 44px 48px;
        padding: 12px 14px;
      }

      .pred-grid {
        grid-template-columns: 1fr 1fr;
        /* already 2 cols — keep this */
      }

      .pred-item {
        padding: 10px 10px;
        /* reduce padding slightly */
      }

      .pred-input {
        width: 36px;
        /* slightly smaller inputs on mobile */
        height: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="sticky-shell">
    <header>
      <div class="header-top">
        <div class="logo">
          <div class="logo-main">WC<span>2026</span></div>
          <div class="logo-sub">Predictor</div>
        </div>
        <button class="sync-btn" id="syncBtn" onclick="syncAll()">
          <span class="sync-icon">&#x21BB;</span>
          <span class="btn-label">Update Scores</span>
        </button>
      </div>
    </header>
    <div class="tabs-wrapper">
      <div class="tab active" onclick="switchTab('predict',this)">Predict</div>
      <div class="tab" onclick="switchTab('leaderboard',this)">Leaderboard</div>
    </div>
  </div>
  <main>
    <div id="predict" class="tab-content active">
      <div id="matchList">
        <div class="state-msg">Loading matches…</div>
      </div>
    </div>
    <div id="leaderboard" class="tab-content">
      <div id="lbList">
        <div class="state-msg">Loading leaderboard…</div>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const TEAM_FLAG = Object.fromEntries(Object.entries({
      'United States': 'us', 'Canada': 'ca', 'Mexico': 'mx',
      'Argentina': 'ar', 'Brazil': 'br', 'Colombia': 'co',
      'Ecuador': 'ec', 'Paraguay': 'py', 'Uruguay': 'uy',
      'Austria': 'at', 'Belgium': 'be', 'Bosnia-Herzegovina': 'ba',
      'Croatia': 'hr', 'Czechia': 'cz', 'England': 'gb-eng',
      'France': 'fr', 'Germany': 'de', 'Netherlands': 'nl',
      'Norway': 'no', 'Portugal': 'pt', 'Scotland': 'gb-sct',
      'Spain': 'es', 'Sweden': 'se', 'Switzerland': 'ch',
      'Turkey': 'tr', 'Australia': 'au', 'Iran': 'ir',
      'Japan': 'jp', 'Jordan': 'jo', 'Qatar': 'qa',
      'Saudi Arabia': 'sa', 'South Korea': 'kr', 'Uzbekistan': 'uz',
      'Algeria': 'dz', 'Cape Verde Islands': 'cv', 'Egypt': 'eg',
      'Ghana': 'gh', 'Ivory Coast': 'ci', 'Morocco': 'ma',
      'Senegal': 'sn', 'South Africa': 'za', 'Tunisia': 'tn',
      'Curaçao': 'cw', 'Haiti': 'ht', 'Panama': 'pa',
      'New Zealand': 'nz', 'Congo DR': 'cd', 'Iraq': 'iq',
    }).map(([k, v]) => [k.toLowerCase(), v]));

    function flagHtml(teamName) {
      if (!teamName) return '';
      const code = TEAM_FLAG[teamName.trim().toLowerCase()];
      if (!code) return '';
      return `<img src="flags/${code}.png" width="24" height="16" style="border-radius:2px;flex-shrink:0;display:block;border:1px solid rgba(0,0,0,0.1);" alt="${teamName}">`;
    }
    // ── APP ────────────────────────────────────────────────────────────────────
    const API = 'https://nowhere-admission-draft-adapters.trycloudflare.com';
    // To use lambda use the url 'https://d369cipp2c.execute-api.us-east-1.amazonaws.com'
    const STAGE_LABEL = { group: 'Group Stage', r32: 'Round of 32', r16: 'Round of 16', qf: 'Quarter Finals', sf: 'Semi Finals', third: 'Third Place', final: 'Final' };
    const predBuffer = {};
    const timers = {};
    let matches = [], users = [];
    let toastTimer;
    let lbInitialized = false;
    let lastLBJson = null;

    // ── FILTER ─────────────────────────────────────────────────────────────────
    let activeFilter = 'all';

    const FILTER_LABELS = {
      all: 'All Matches',
      today: "Today's Matches",
      group: 'Group Stage Matches',
      r32: 'Round of 32 Matches',
      r16: 'Round of 16 Matches',
      qf: 'Quarter Finals',
      sf: 'Semi Finals',
      third: 'Third Place',
      final: 'Final',
    };

    function getTodayWindow() {
      const now = new Date();
      const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
      const start = new Date(ist);
      start.setHours(0, 0, 0, 0);
      const end = new Date(ist);
      end.setDate(end.getDate() + 1);
      end.setHours(23, 59, 59, 999);
      // convert back to UTC offset for comparison
      const offset = now.getTime() - ist.getTime();
      return {
        start: new Date(start.getTime() + offset),
        end: new Date(end.getTime() + offset)
      };
    }

    function matchesFilter(m, filter) {
      if (filter === 'all') return true;
      if (filter === 'today') {
        const { start, end } = getTodayWindow();
        const kickoff = parseUTC(m.kickoff);
        if (!kickoff) return false;
        // also show finished matches from today window
        return kickoff >= start && kickoff <= end;
      }
      return m.stage === filter;
    }

    function getAvailableFilters() {
      const stages = [...new Set(matches.map(m => m.stage))];
      const filters = ['all', 'today', ...stages];
      return filters;
    }

    function getNearestMatch() {
      const now = new Date();
      const upcoming = matches.filter(m => {
        const k = parseUTC(m.kickoff);
        return k && k > now && m.status !== 'FINISHED';
      });
      if (!upcoming.length) return null;
      return upcoming.reduce((a, b) => {
        return parseUTC(a.kickoff) < parseUTC(b.kickoff) ? a : b;
      });
    }

    function getTodayHint() {
      const { end } = getTodayWindow();
      const opts = { day: 'numeric', month: 'short', timeZone: 'Asia/Kolkata' };
      return 'Matches through ' + end.toLocaleDateString('en-IN', opts) + ' IST';
    }

    function buildSheetItems() {
      const filters = getAvailableFilters();
      const container = document.getElementById('sheetItems');
      if (!container) return;

      container.innerHTML = filters.map(f => {
        const isActive = f === activeFilter;
        return `<div class="sheet-item" onclick="applyFilter('${f}')">
      <div class="sheet-item-left">
        <div class="sheet-dot ${isActive ? 'active' : ''}"></div>
        <div class="sheet-item-name ${isActive ? 'active' : ''}">${FILTER_LABELS[f] || f}</div>
      </div>
      <div class="sheet-check ${isActive ? 'active' : ''}">✓</div>
    </div>`;
      }).join('');
    }

    function openFilterSheet() {
      buildSheetItems();
      document.getElementById('sheetOverlay').classList.add('open');
      document.getElementById('filterSheet').classList.add('open');
    }

    function closeFilterSheet() {
      document.getElementById('sheetOverlay').classList.remove('open');
      document.getElementById('filterSheet').classList.remove('open');
    }

    function applyFilter(filter) {
      activeFilter = filter;
      closeFilterSheet();

      const label = document.getElementById('fabLabel');
      if (label) label.textContent = FILTER_LABELS[filter] || filter;

      const container = document.getElementById('matchList');
      if (!container) return;

      // check if today filter has any matches, else fall back to nearest
      if (filter === 'today') {
        const todayMatches = matches.filter(m => matchesFilter(m, 'today'));
        if (!todayMatches.length) {
          const nearest = getNearestMatch();
          if (nearest) {
            const card = container.querySelector(`[data-matchid="${nearest.match_id}"]`);
            if (card) {
              const top = card.getBoundingClientRect().top + window.scrollY - 170;
              window.scrollTo({ top, behavior: 'smooth' });
            }
            return;
          }
        }
      }

      // hide/show cards and stage headers
      const allCards = container.querySelectorAll('.match-card');
      const allHeaders = container.querySelectorAll('.stage-header');

      allCards.forEach(card => {
        const mid = card.dataset.matchid;
        const m = matches.find(x => String(x.match_id) === String(mid));
        if (!m) return;
        card.style.display = matchesFilter(m, filter) ? '' : 'none';
        // also hide pred-sentence
        const sent = container.querySelector(`.pred-sentence[data-matchid="${mid}"]`);
        if (sent) sent.style.display = matchesFilter(m, filter) ? '' : 'none';
      });

      // hide stage headers if all cards in that stage are hidden
      allHeaders.forEach(header => {
        const stage = header.dataset.stage;
        const stageCards = container.querySelectorAll(`.match-card[data-matchid]`);
        let anyVisible = false;
        stageCards.forEach(card => {
          const mid = card.dataset.matchid;
          const m = matches.find(x => String(x.match_id) === String(mid));
          if (m && m.stage === stage && matchesFilter(m, filter)) anyVisible = true;
        });
        header.style.display = anyVisible ? '' : 'none';
      });

      // scroll to first visible card
      const firstVisible = container.querySelector('.match-card:not([style*="display: none"])');
      if (firstVisible) {
        const top = firstVisible.getBoundingClientRect().top + window.scrollY - 170;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }

    // auto-select today on boot if matches exist for today+tomorrow window
    function autoSelectFilter() {
      const todayMatches = matches.filter(m => matchesFilter(m, 'today'));
      if (todayMatches.length) {
        applyFilter('today');
      }
      // else stay on 'all', no action needed
    }

    function tickCountdowns() {
      const now = new Date();
      document.querySelectorAll('.match-countdown').forEach(el => {
        const status = el.dataset.status;
        const kickoff = parseUTC(el.dataset.kickoff);
        if (!kickoff) { el.textContent = ''; return; }
        if (status === 'FINISHED') { el.textContent = ''; return; }

        const diff = kickoff.getTime() - now.getTime();
        if (diff <= 0) { el.textContent = ''; return; }

        const totalSec = Math.floor(diff / 1000);
        const d = Math.floor(totalSec / 86400);
        const h = Math.floor((totalSec % 86400) / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;

        let str = '';
        if (d > 0) str = d + 'd ' + h + 'h ' + m + 'm ' + s + 's';
        else if (h > 0) str = h + 'h ' + m + 'm ' + s + 's';
        else str = m + 'm ' + s + 's';

        if (diff < 3600000) el.style.color = 'var(--red)';
        else if (diff < 86400000) el.style.color = 'var(--gold)';
        else el.style.color = 'var(--ink4)';

        el.textContent = 'Kickoff in ' + str;
      });
    }

    setInterval(tickCountdowns, 1000);
    tickCountdowns();

    // ── BOOT ───────────────────────────────────────────────────────────────────
    async function boot() {
      renderSkeleton();
      try {
        const [ru, rm] = await Promise.all([
          fetch(API + '/users').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
          fetch(API + '/matches').then(r => { if (!r.ok) throw new Error(); return r.json(); })
        ]);
        users = ru; matches = rm; sortUsers();
        buildMatchDOM();
        autoSelectFilter();
      } catch (err) {
        document.getElementById('matchList').innerHTML = '<div class="state-msg">Could not load data. Check your connection.</div>';
        showToast('Failed to load data', true);
      }
    }

    // ── SKELETON ───────────────────────────────────────────────────────────────
    function renderSkeleton() {
      var cards = Array.from({ length: 5 }, function () {
        return '<div class="skel-card">' +
          '<div class="skel sk-team"></div>' +
          '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">' +
          '<div class="skel sk-score"></div><div class="skel sk-meta"></div>' +
          '</div>' +
          '<div class="skel sk-team"></div>' +
          '</div>';
      }).join('');
      document.getElementById('matchList').innerHTML =
        '<div class="stage-header"><div class="skel" style="height:12px;width:80px"></div>' +
        '<div class="stage-rule"></div></div>' + cards;
    }

    // ── UTILS ──────────────────────────────────────────────────────────────────
    function sortUsers() { users.sort((a, b) => (a.display_name || '').localeCompare(b.display_name || '')); }

    function parseUTC(str) {
      if (!str) return null;
      var s = str;
      if (s.charAt(s.length - 1) !== 'Z' && s.indexOf('+') === -1 && !/\d\d:\d\d:\d\d-\d\d/.test(s)) s += 'Z';
      var d = new Date(s);
      return isNaN(d.getTime()) ? null : d;
    }

    function fmtDate(dt) {
      return dt.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', timeZone: 'Asia/Kolkata' });
    }

    function fmtTime(dt) {
      return dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' }).toUpperCase() + ' IST';
    }

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function getMatchMeta(m) {
      var finished = m.status === 'FINISHED';
      var kickoffDt = parseUTC(m.kickoff);
      var lockTime = kickoffDt ? new Date(kickoffDt.getTime() - 3600000) : null;
      var locked = finished || (lockTime && new Date() > lockTime);
      return {
        finished: finished,
        kickoffDt: kickoffDt,
        locked: locked,
        badgeCls: finished ? 'finished' : 'upcoming',
        badgeTxt: finished ? 'Full Time' : (kickoffDt ? fmtDate(kickoffDt) : ''),
        timeStr: kickoffDt ? fmtTime(kickoffDt) : ''
      };
    }

    // ── PRED ITEM HTML ─────────────────────────────────────────────────────────
    function buildPredItemHTML(u, matchid, pred, finished, locked) {
      var ph = (pred != null && pred.pred_home !== undefined) ? pred.pred_home : '';
      var pa = (pred != null && pred.pred_away !== undefined) ? pred.pred_away : '';
      var pts = pred ? pred.points : null;
      var pillCls = 'pnd', pillTxt = 'Pending';
      if (finished) {
        if (!pred) { pillCls = 'p0'; pillTxt = 'No pick'; }
        else if (pts === 3) { pillCls = 'p3'; pillTxt = '3 Exact'; }
        else if (pts === 1) { pillCls = 'p1'; pillTxt = '1 Result'; }
        else { pillCls = 'p0'; pillTxt = '0 Miss'; }
      }
      var dis = locked ? 'disabled' : '';
      var uid = escHtml(u.user_id);
      var mid = escHtml(matchid);
      return '<div class="pred-item" data-userid="' + uid + '">' +
        '<div class="pred-name">' + escHtml(u.display_name) + '</div>' +
        '<div class="pred-score-row">' +
        '<input class="pred-input" type="number" min="0" max="20" placeholder="-" value="' + ph + '" ' + dis +
        ' data-matchid="' + mid + '" data-userid="' + uid + '" data-side="home"' +
        ' onclick="event.stopPropagation()" onblur="savePred(this)" data-role="input-home">' +
        '<span class="pred-sep">:</span>' +
        '<input class="pred-input" type="number" min="0" max="20" placeholder="-" value="' + pa + '" ' + dis +
        ' data-matchid="' + mid + '" data-userid="' + uid + '" data-side="away"' +
        ' onclick="event.stopPropagation()" onblur="savePred(this)" data-role="input-away">' +
        '</div>' +
        '<div class="points-pill ' + pillCls + '" data-role="pill">' + pillTxt + '</div>' +
        '</div>';
    }

    function buildPredSentence(m, users) {
      var predicted = [];
      users.forEach(function (u) {
        var pred = m.predictions ? m.predictions[u.user_id] : null;
        if (pred && pred.pred_home !== undefined && pred.pred_away !== undefined) {
          predicted.push((u.display_name || '').split(' ')[0]);
        }
      });
      if (!predicted.length) return '<span style="color:var(--ink4)">No predictions yet</span>';
      var predStr = predicted.length > 3
        ? predicted.slice(0, 2).join(', ') + ' &amp; ' + (predicted.length - 2) + ' others'
        : predicted.join(', ');
      return '<span style="font-weight:800;color:var(--green)">' + predStr + '</span> predicted';
    }

    // ── ALIGN LAST ROW (pyramid centering) ────────────────────────────────────
    function alignLastPredRow(grid) {
      const items = grid.querySelectorAll('.pred-item');
      if (!items.length) return;

      // Detect actual column count from rendered layout
      const firstTop = items[0].getBoundingClientRect().top;
      let cols = 0;
      for (let i = 0; i < items.length; i++) {
        if (items[i].getBoundingClientRect().top !== firstTop) break;
        cols++;
      }
      if (cols < 1) cols = 1;

      const remainder = items.length % cols;
      if (remainder === 0) return;

      // Reset all gridColumnStart first
      items.forEach(el => el.style.gridColumnStart = '');

      const offset = Math.floor((cols - remainder) / 2) + 1;
      for (let i = items.length - remainder; i < items.length; i++) {
        items[i].style.gridColumnStart = offset + (i - (items.length - remainder));
      }
    }

    window.addEventListener('resize', () => {
      document.querySelectorAll('.pred-grid').forEach(alignLastPredRow);
    });

    // ── BUILD CARD HTML ────────────────────────────────────────────────────────
    function buildCardHTML(m) {
      var meta = getMatchMeta(m);
      var homeTeam = m.team_home || 'TBD';
      var awayTeam = m.team_away || 'TBD';
      var sh = meta.finished
        ? '<span class="score-num final" data-role="sh">' + (m.score_home !== undefined && m.score_home !== null ? m.score_home : '') + '</span>'
        : '<span class="score-num pending" data-role="sh">–</span>';
      var sa = meta.finished
        ? '<span class="score-num final" data-role="sa">' + (m.score_away !== undefined && m.score_away !== null ? m.score_away : '') + '</span>'
        : '<span class="score-num pending" data-role="sa">–</span>';
      var predsHtml = '';
      if (users.length) {
        predsHtml = '<div class="pred-grid">';
        users.forEach(function (u) {
          var pred = m.predictions ? m.predictions[u.user_id] : null;
          predsHtml += buildPredItemHTML(u, m.match_id, pred, meta.finished, meta.locked);
        });
        predsHtml += '</div>';
      } else {
        predsHtml = '<div style="color:var(--ink4);font-family:Instrument Serif,serif;font-style:italic;font-size:0.9rem">No players added yet.</div>';
      }
      return '<div class="match-card new-card" data-matchid="' + escHtml(m.match_id) + '" onclick="toggleCard(this)">' +
        '<div class="match-row">' +
        '<div class="team-cell home">' +
        '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">' +
        flagHtml(homeTeam) +
        '<span class="team-name">' + escHtml(homeTeam) + '</span>' +
        '</div>' +
        '</div>' +
        '<div class="centre-block">' +
        '<div class="score-display">' + sh + '<span class="score-dash">·</span>' + sa + '</div>' +
        '<div class="match-status">' +
        '<div class="badge ' + meta.badgeCls + '" data-role="badge">' + meta.badgeTxt + '</div>' +
        '<div class="match-time" data-role="time">' + meta.timeStr + '</div>' +
        '</div></div>' +
        '<div class="team-cell away">' +
        '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">' +
        flagHtml(awayTeam) +
        '<span class="team-name">' + escHtml(awayTeam) + '</span>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '<div class="predictions-panel"><div class="predictions-panel-inner">' + predsHtml + '</div></div>' +
        '<div class="pred-sentence" data-matchid="' + escHtml(m.match_id) + '" style="padding:7px 16px 8px;border-top:1px solid var(--rule);background:var(--paper);font-family:\'Barlow Condensed\',sans-serif;font-size:0.82rem;letter-spacing:0.01em;color:var(--ink4);display:flex;align-items:center;justify-content:space-between;">' +
        '<span class="pred-sentence-txt">' + buildPredSentence(m, users) + '</span>' +
        '<span class="match-countdown" data-kickoff="' + escHtml(m.kickoff || '') + '" data-status="' + escHtml(m.status || '') + '" style="font-family:\'Barlow Condensed\',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.06em;color:var(--ink4);white-space:nowrap;"></span>' +
        '</div>' +
        '</div>';
    }

    // ── FULL DOM BUILD ─────────────────────────────────────────────────────────
    function buildMatchDOM() {
      var container = document.getElementById('matchList');
      if (!matches.length) { container.innerHTML = '<div class="state-msg">No matches yet.</div>'; return; }
      var html = '', lastStage = null;
      matches.forEach(function (m) {
        if (m.stage !== lastStage) {
          html += '<div class="stage-header" data-stage="' + escHtml(m.stage) + '">' +
            '<div class="stage-label">' + (STAGE_LABEL[m.stage] || m.stage) + '</div>' +
            '<div class="stage-rule"></div></div>';
          lastStage = m.stage;
        }
        html += buildCardHTML(m);
      });
      container.innerHTML = html;
      requestAnimationFrame(() => {
        container.querySelectorAll('.pred-grid').forEach(alignLastPredRow);
      });
    }

    // ── PATCH DOM ──────────────────────────────────────────────────────────────
    function patchMatchDOM(oldMatches, newMatches, newUsers) {
      const container = document.getElementById('matchList');
      if (!container) return;
      const activeEl = document.activeElement;

      newMatches.forEach(function (nm) {
        const card = container.querySelector('[data-matchid="' + nm.match_id + '"]');
        if (!card) return;

        const meta = getMatchMeta(nm);

        const homeEl = card.querySelector('.team-cell.home .team-name');
        const awayEl = card.querySelector('.team-cell.away .team-name');
        if (homeEl) {
          homeEl.querySelector('img') && (homeEl.querySelector('img').src = flagHtml(nm.team_home || '') ? `flags/${TEAM_FLAG[nm.team_home]}.png` : '');
          const hn = homeEl.querySelector('.team-name');
          if (hn) hn.textContent = nm.team_home || 'TBD';
        }
        if (awayEl) {
          awayEl.querySelector('img') && (awayEl.querySelector('img').src = flagHtml(nm.team_away || '') ? `flags/${TEAM_FLAG[nm.team_away]}.png` : '');
          const an = awayEl.querySelector('.team-name');
          if (an) an.textContent = nm.team_away || 'TBD';
        }

        const sh = card.querySelector('[data-role="sh"]');
        const sa = card.querySelector('[data-role="sa"]');
        if (sh && meta.finished) { sh.className = 'score-num final'; sh.textContent = (nm.score_home !== undefined && nm.score_home !== null ? nm.score_home : ''); }
        if (sa && meta.finished) { sa.className = 'score-num final'; sa.textContent = (nm.score_away !== undefined && nm.score_away !== null ? nm.score_away : ''); }

        const badge = card.querySelector('[data-role="badge"]');
        if (badge) { badge.className = 'badge ' + meta.badgeCls; badge.textContent = meta.badgeTxt; }

        const sentenceEl = container.querySelector('.pred-sentence[data-matchid="' + nm.match_id + '"]');
        if (sentenceEl) {
          const sentTxt = sentenceEl.querySelector('.pred-sentence-txt');
          if (sentTxt) sentTxt.innerHTML = buildPredSentence(nm, newUsers);
        }

        const timeEl = card.querySelector('[data-role="time"]');
        if (timeEl) timeEl.textContent = meta.timeStr;

        if (card) {
          const cd = card.querySelector('.match-countdown');
          if (cd) cd.dataset.status = nm.status || '';
        }

        newUsers.forEach(function (u) {
          const pred = nm.predictions ? nm.predictions[u.user_id] : null;
          const predItem = card.querySelector('.pred-item[data-userid="' + u.user_id + '"]');
          if (!predItem) return;

          const pill = predItem.querySelector('[data-role="pill"]');
          if (pill) {
            let cls = 'pnd', txt = 'Pending';
            if (meta.finished) {
              if (!pred) { cls = 'p0'; txt = 'No pick'; }
              else if (pred.points === 3) { cls = 'p3'; txt = '3 Exact'; }
              else if (pred.points === 1) { cls = 'p1'; txt = '1 Result'; }
              else { cls = 'p0'; txt = '0 Miss'; }
            }
            pill.className = 'points-pill ' + cls;
            pill.textContent = txt;
          }

          const inHome = predItem.querySelector('[data-role="input-home"]');
          const inAway = predItem.querySelector('[data-role="input-away"]');
          if (inHome && inHome !== activeEl && pred && pred.pred_home !== undefined) inHome.value = pred.pred_home;
          if (inAway && inAway !== activeEl && pred && pred.pred_away !== undefined) inAway.value = pred.pred_away;
          if (inHome) inHome.disabled = meta.locked;
          if (inAway) inAway.disabled = meta.locked;
        });
      });
      requestAnimationFrame(() => {
        document.querySelectorAll('.pred-grid').forEach(alignLastPredRow);
      });
    }

    function toggleCard(card) { card.classList.toggle('open'); }

    // ── TABS ───────────────────────────────────────────────────────────────────
    function switchTab(id, el) {
      document.querySelectorAll('.tab-content').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
      el.classList.add('active');
      if (id === 'leaderboard') renderLeaderboard();
    }

    // ── LEADERBOARD ────────────────────────────────────────────────────────────
    function renderLBData(data) {
      if (!data.length) { document.getElementById('lbList').innerHTML = '<div class="state-msg">No players yet.</div>'; return; }

      data.sort(function (a, b) {
        if (b.total_points !== a.total_points) return b.total_points - a.total_points;
        if ((b.exact || 0) !== (a.exact || 0)) return (b.exact || 0) - (a.exact || 0);
        return (a.display_name || '').localeCompare(b.display_name || '');
      });

      const medals = ['&#x1F947;', '&#x1F948;', '&#x1F949;'];
      let html = '<div class="lb-wrap">' +
        '<div class="lb-title-row"><div class="lb-title">Standings</div>' +
        '<div class="lb-sub">' + data.length + ' player' + (data.length !== 1 ? 's' : '') + ' competing since 2018</div></div>' +
        '<div class="lb-header-row"><div></div><div>Player</div><div>Pts</div><div>Exact</div><div>Result</div></div>';

      data.forEach(function (u, i) {
        const rowcls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
        const rcls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
        const rankDisplay = i < 3 ? medals[i] : (i + 1);
        html += '<div class="lb-row ' + rowcls + '">' +
          '<div class="rank-cell"><span class="rank-num ' + rcls + '">' + rankDisplay + '</span></div>' +
          '<div class="lb-name-cell"><div class="lb-name">' + escHtml(u.display_name) + '</div></div>' +
          '<div class="lb-pts">' + (u.total_points || 0) + '</div>' +
          '<div class="lb-num">' + (u.exact || 0) + '</div>' +
          '<div class="lb-num">' + (u.correct || 0) + '</div>' +
          '</div>';
      });

      html += '</div>' +
        '<div class="rules-box">' +
        '<div class="rules-title">How It Works</div>' +
        '<table class="rules-table"><thead><tr><th>Event</th><th class="pts-col">Points</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>Exact score</td><td class="pts-col"><span class="green-pts">3</span></td></tr>' +
        '<tr><td>Correct result (win/draw/loss)</td><td class="pts-col"><span class="blue-pts">1</span></td></tr>' +
        '<tr><td>Wrong prediction</td><td class="pts-col"><span class="grey-pts">0</span></td></tr>' +
        '</tbody></table>' +
        '<div class="rules-divider"></div>' +
        '<div class="rules-sub">Tiebreakers in order</div>' +
        '<ol class="rules-list"><li>More exact scores (3-pt calls)</li><li>Alphabetical order of name</li></ol>' +
        '<div class="rules-divider"></div>' +
        '<div class="rules-list-item">Predictions lock <strong>60 minutes</strong> before kickoff — submit early!</div>' +
        '</div>';

      document.getElementById('lbList').innerHTML = html;
    }

    function renderLeaderboard() {
      if (lbInitialized) return;
      lbInitialized = true;
      renderLBSkeleton();
      fetch(API + '/leaderboard')
        .then(res => res.json())
        .then(data => {
          if (!Array.isArray(data)) return;
          lastLBJson = JSON.stringify(data);
          renderLBData(data);
        })
        .catch(() => {
          document.getElementById('lbList').innerHTML = '<div class="state-msg">Could not load leaderboard.</div>';
          lbInitialized = false;
        });
    }

    function renderLBSkeleton() {
      var rows = Array.from({ length: 7 }, function () {
        return '<div class="sk-lb-row">' +
          '<div class="skel sk-rank"></div><div class="skel sk-name"></div>' +
          '<div class="skel sk-pts"></div><div class="skel sk-stat"></div><div class="skel sk-stat"></div>' +
          '</div>';
      }).join('');
      document.getElementById('lbList').innerHTML =
        '<div class="lb-wrap"><div class="lb-title-row"><div class="lb-title">Standings</div></div>' +
        '<div class="lb-header-row"><div></div><div>Player</div><div>Pts</div><div>Exact</div><div>Result</div></div>' +
        rows + '</div>';
    }

    // ── SAVE PREDICTION ────────────────────────────────────────────────────────
    function savePred(input) {
      var matchId = input.dataset.matchid;
      var userId = input.dataset.userid;
      var side = input.dataset.side;
      var val = input.value.trim();
      if (!matchId || !userId || !side || val === '') return;
      var key = matchId + userId;
      if (!predBuffer[key]) {
        var inputs = input.closest('.pred-item').querySelectorAll('.pred-input');
        predBuffer[key] = {
          home: inputs[0].value.trim() !== '' ? parseInt(inputs[0].value, 10) : null,
          away: inputs[1].value.trim() !== '' ? parseInt(inputs[1].value, 10) : null
        };
      }
      predBuffer[key][side] = parseInt(val, 10);
      if (timers[key]) clearTimeout(timers[key]);
      timers[key] = setTimeout(function () {
        var buf = predBuffer[key];
        if (buf.home === null || buf.away === null) return;
        showToast('Saving…');
        fetch(API + '/predictions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, match_id: parseInt(matchId, 10), pred_home: buf.home, pred_away: buf.away })
        }).then(r => r.json()).then(d => {
          if (d.status === 'saved') showToast('Saved ✓');
          else showToast(d.error || 'Error saving', true);
        }).catch(() => showToast('Network error', true));
      }, 500);
    }

    // ── SYNC ───────────────────────────────────────────────────────────────────
    async function syncAll() {
      var btn = document.getElementById('syncBtn');
      var lbl = btn.querySelector('.btn-label');
      btn.disabled = true; btn.classList.add('spinning');
      if (lbl) lbl.textContent = 'Refreshing…';
      try {
        var data = await fetch(API + '/sync', { method: 'POST' }).then(r => r.json());
        showToast('Synced ' + data.count + ' match' + (data.count !== 1 ? 'es' : ''));
        const [mu, mm] = await Promise.all([
          fetch(API + '/users').then(r => r.json()),
          fetch(API + '/matches').then(r => r.json())
        ]);
        const oldMatches = matches;
        users = mu; matches = mm; sortUsers();
        patchMatchDOM(oldMatches, mm, mu);
        if (document.getElementById('leaderboard').classList.contains('active')) renderLeaderboard();
      } catch (e) {
        console.error('[WC2026] sync failed:', e);
        showToast('Sync failed', true);
      } finally {
        btn.disabled = false; btn.classList.remove('spinning');
        if (lbl) lbl.textContent = 'Update Scores';
      }
    }

    // ── TOAST ──────────────────────────────────────────────────────────────────
    function showToast(msg, isError) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '') + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { t.classList.remove('show'); }, 3000);
    }

    // ── POLL ───────────────────────────────────────────────────────────────────
    async function doPoll() {
      if (document.hidden || (document.activeElement && document.activeElement.classList.contains('pred-input'))) return;
      try {
        const [mu, mm] = await Promise.all([
          fetch(API + '/users').then(r => r.ok ? r.json() : null).catch(() => null),
          fetch(API + '/matches').then(r => r.ok ? r.json() : null).catch(() => null)
        ]);
        if (!mu || !mm || !Array.isArray(mu) || !Array.isArray(mm)) return;
        const oldMatches = matches;
        users = mu; matches = mm; sortUsers();
        patchMatchDOM(oldMatches, mm, mu);
        if (document.getElementById('leaderboard').classList.contains('active')) {
          fetch(API + '/leaderboard').then(r => r.json()).then(data => {
            if (!Array.isArray(data)) return;
            const json = JSON.stringify(data);
            if (json === lastLBJson) return;
            lastLBJson = json;
            renderLBData(data);
          }).catch(() => { });
        }
      } catch (e) { }
    }

    let fastPoll = null;
    let slowPoll = null;
    let idleTimeout = null;

    function startFastPoll() {
      if (fastPoll) return;
      fastPoll = setInterval(doPoll, 30 * 1000);
    }

    function switchToSlowPoll() {
      if (fastPoll) { clearInterval(fastPoll); fastPoll = null; }
      slowPoll = setInterval(doPoll, 2 * 60 * 1000);
    }

    function resetIdleTimer() {
      clearTimeout(idleTimeout);
      if (slowPoll) { clearInterval(slowPoll); slowPoll = null; startFastPoll(); }
      idleTimeout = setTimeout(switchToSlowPoll, 30 * 60 * 1000);
    }

    boot();

    setTimeout(function () {
      startFastPoll();
      resetIdleTimer();
    }, 3000);

    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        clearInterval(fastPoll); fastPoll = null;
        clearInterval(slowPoll); slowPoll = null;
      } else {
        startFastPoll();
        resetIdleTimer();
        setTimeout(doPoll, 500);
      }
    });

    document.addEventListener('click', resetIdleTimer);
    document.addEventListener('keydown', resetIdleTimer);
  </script>
  <div class="filter-fab">
    <button class="filter-fab-btn" onclick="openFilterSheet()">
      <span id="fabLabel">Filter</span>
      <span class="fab-accent">▾</span>
    </button>
  </div>

  <div class="filter-sheet-overlay" id="sheetOverlay" onclick="closeFilterSheet()"></div>

  <div class="filter-sheet" id="filterSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Show</div>
    <div id="sheetItems"></div>
  </div>
</body>

</html>
