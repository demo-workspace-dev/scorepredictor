<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://sparkling-frost-59a4.satyajeetking.workers.dev" crossorigin />
  <link rel="dns-prefetch" href="https://sparkling-frost-59a4.satyajeetking.workers.dev" />
  <link rel="icon" href="award.png">
  <title>WC2026 Predictor</title>
  <style>
    @keyframes shimmer {
      0% {
        background-position: -600px 0;
      }

      100% {
        background-position: 600px 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      padding: 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sk-team {
      height: 14px;
      width: 90px;
    }

    .sk-score {
      height: 32px;
      width: 80px;
      border-radius: 8px;
    }

    .sk-meta {
      height: 10px;
      width: 60px;
      margin-top: 6px;
    }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card2: #22263a;
      --accent: #3b82f6;
      --accent2: #10b981;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: #2d3148;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Roboto, system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo span {
      color: var(--accent);
    }

    .sync-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .sync-btn:hover {
      background: #2563eb;
    }

    .sync-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .tabs {
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 60px;
      z-index: 99;
    }

    .tab {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stage-header {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 24px 0 10px;
      padding-left: 4px;
    }

    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .match-card:hover {
      border-color: #3b4268;
    }

    .match-row {
      display: flex;
      align-items: center;
      padding: 14px 12px;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .team-cell {
      flex: 1;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .team-cell.home {
      justify-content: flex-end;
    }

    .team-cell.away {
      justify-content: flex-start;
    }

    .team-name {
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-cell.home .team-name {
      text-align: right;
    }

    .team-cell.away .team-name {
      text-align: left;
    }

    .centre-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 110px;
      flex-shrink: 0;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .score-box {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .score-box.final {
      background: #1e293b;
      color: var(--accent2);
    }

    .score-box.pending {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .score-sep {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .match-meta {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge.upcoming {
      background: #1e293b;
      color: var(--muted);
    }

    .badge.finished {
      background: #14532d;
      color: var(--accent2);
    }

    .badge.live {
      background: #7c2d12;
      color: #fb923c;
    }

    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .expand-btn:hover {
      color: var(--text);
      background: var(--card2);
    }

    .predictions-panel {
      display: none;
      background: var(--card2);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
    }

    .predictions-panel.open {
      display: block;
    }

    .pred-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: 10px;
    }

    .pred-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pred-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pred-score-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pred-input {
      width: 38px;
      height: 36px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .pred-input::-webkit-outer-spin-button,
    .pred-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .pred-input:focus {
      border-color: var(--accent);
    }

    .pred-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      border-color: transparent;
    }

    .pred-sep {
      color: var(--muted);
      font-weight: 700;
    }

    .points-pill {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      align-self: flex-start;
    }

    .points-pill.p3 {
      background: #14532d;
      color: #4ade80;
    }

    .points-pill.p1 {
      background: #1e3a5f;
      color: #60a5fa;
    }

    .points-pill.p0 {
      background: #2d1b1b;
      color: #f87171;
    }

    .points-pill.pnd {
      background: #1e293b;
      color: var(--muted);
    }

    .lb-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 44px 1fr 64px 52px 52px;
      align-items: center;
      padding: 14px 16px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .lb-row:last-child {
      border-bottom: none;
    }

    .lb-row.header {
      background: var(--card2);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .rank {
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
    }

    .rank.r1 {
      color: var(--gold);
    }

    .rank.r2 {
      color: var(--silver);
    }

    .rank.r3 {
      color: var(--bronze);
    }

    .lb-name {
      font-weight: 600;
    }

    .lb-pts {
      font-weight: 800;
      font-size: 1rem;
      color: var(--accent2);
      text-align: center;
    }

    .lb-num {
      text-align: center;
      font-size: 0.9rem;
    }

    .state-msg {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.error {
      border-color: #ef4444;
      color: #ef4444;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .team-name {
        font-size: 0.8rem;
      }

      .centre-block {
        min-width: 90px;
      }

      .score-box {
        width: 28px;
        height: 28px;
        font-size: 0.85rem;
      }

      .pred-grid {
        grid-template-columns: 1fr 1fr;
      }

      .lb-row {
        grid-template-columns: 36px 1fr 52px 42px 42px;
        padding: 11px;
        font-size: 0.83rem;
      }

      .tab {
        padding: 12px 16px;
        font-size: 0.85rem;
      }

      .sync-btn .label {
        display: none;
      }

      main {
        padding: 16px 10px 80px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">⚽ <span>WC2026</span> Predictor</div>
    <button class="sync-btn" id="syncBtn" onclick="syncAll()">
      <span>🔄</span><span class="label"> Sync</span>
    </button>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('predict', this)">🗓 Predict</div>
    <div class="tab" onclick="switchTab('leaderboard', this)">🏆 Leaderboard</div>
  </div>

  <main>
    <div id="predict" class="tab-content active">
      <div id="matchList">
        <div class="state-msg">Loading matches…</div>
      </div>
    </div>
    <div id="leaderboard" class="tab-content">
      <div id="lbList">
        <div class="state-msg">Loading leaderboard…</div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
const API = 'https://sparkling-frost-59a4.satyajeetking.workers.dev';

const STAGE_LABEL = {
  group: 'Group Stage',
  r32: 'Round of 32',
  r16: 'Round of 16',
  qf: 'Quarter Finals',
  sf: 'Semi Finals',
  third: 'Third Place',
  final: 'Final',
};

let matches = [];
let users = [];
let toastTimer;

// ── Cache ─────────────────────────
function cachePaint(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed && !Array.isArray(parsed) && parsed.data !== undefined)
      return parsed.data;
    return parsed;
  } catch { return null; }
}
function cacheSave(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); }
  catch {}
}

// ── Skeleton ──────────────────────
function renderSkeleton() {
  const cards = Array.from({ length: 6 }, () => `
    <div class="skeleton-card">
      <div class="skeleton sk-team"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="skeleton sk-score"></div>
        <div class="skeleton sk-meta"></div>
      </div>
      <div class="skeleton sk-team"></div>
    </div>`).join('');
  document.getElementById('matchList').innerHTML =
    '<div class="stage-header">Loading…</div>' + cards;
}

// ── Boot ──────────────────────────
async function boot() {
  const paintUsers = cachePaint('wc2026_users');
  const paintMatches = cachePaint('wc2026_matches');

  const hasValidCache =
    Array.isArray(paintUsers) && paintUsers.length > 0 &&
    Array.isArray(paintMatches) && paintMatches.length > 0;

  if (hasValidCache) {
    users = paintUsers;
    matches = paintMatches;
    renderMatches({ hidePredictions: true });
  } else {
    renderSkeleton();
  }

  try {
    const [mu, mm] = await Promise.all([
      fetch(API + '/users').then(r => r.json()),
      fetch(API + '/matches').then(r => r.json()),
    ]);

    users = mu;
    matches = mm;

    cacheSave('wc2026_users', mu);
    cacheSave('wc2026_matches', mm);

    // 👉 If UI already rendered → update only predictions
    if (document.querySelector('.match-card')) {
      updatePredictionsOnly(mm);
    } else {
      renderMatches({ hidePredictions: false });
    }

  } catch (e) {
    if (!hasValidCache) {
      document.getElementById('matchList').innerHTML =
        '<div class="state-msg">⚠️ Could not load data.</div>';
      showToast('Failed to load', true);
    }
  }
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) boot();
});

// ── Helpers ───────────────────────
function parseUTC(str) {
  if (!str) return null;
  if (!str.endsWith('Z') && !str.includes('+')) str += 'Z';
  return new Date(str);
}
function formatDate(dt) {
  return dt.toLocaleDateString('en-IN', {
    day: 'numeric', month: 'short', timeZone: 'Asia/Kolkata'
  });
}
function formatTime(dt) {
  return dt.toLocaleTimeString('en-IN', {
    hour: '2-digit', minute: '2-digit',
    hour12: true, timeZone: 'Asia/Kolkata'
  }).toUpperCase() + ' IST';
}

// ── Render Matches ─────────────────
function renderMatches(options = { hidePredictions: false }) {
  const container = document.getElementById('matchList');

  if (!matches.length) {
    container.innerHTML = '<div class="state-msg">No matches yet.</div>';
    return;
  }

  let html = '';
  let lastStage = null;

  matches.forEach(m => {
    if (m.stage !== lastStage) {
      html += `<div class="stage-header">${STAGE_LABEL[m.stage] || m.stage}</div>`;
      lastStage = m.stage;
    }

    const kickoffDt = parseUTC(m.kickoff);
    const dateStr = kickoffDt ? formatDate(kickoffDt) : '—';
    const timeStr = kickoffDt ? formatTime(kickoffDt) : '';

    let predsHtml = '';

    if (options.hidePredictions) {
      predsHtml = `
        <div class="pred-grid">
          ${Array.from({ length: 4 }).map(() => `
            <div class="pred-item">
              <div class="skeleton sk-meta" style="width:70px;"></div>
              <div class="pred-score-row">
                <div class="skeleton sk-score"></div>
                <div class="pred-sep">:</div>
                <div class="skeleton sk-score"></div>
              </div>
            </div>
          `).join('')}
        </div>`;
    } else if (users.length) {
      predsHtml = '<div class="pred-grid">';

      users.forEach(u => {
        const pred = (m.predictions || {})[u.user_id];
        const ph = pred ? pred.pred_home : '';
        const pa = pred ? pred.pred_away : '';

        predsHtml += `
          <div class="pred-item">
            <div class="pred-name">${escHtml(u.display_name)}</div>
            <div class="pred-score-row">
              <input 
                id="pred-${m.match_id}-${u.user_id}-home"
                class="pred-input"
                value="${ph}"
              />
              <div class="pred-sep">:</div>
              <input 
                id="pred-${m.match_id}-${u.user_id}-away"
                class="pred-input"
                value="${pa}"
              />
            </div>
          </div>`;
      });

      predsHtml += '</div>';
    }

    html += `
      <div class="match-card">
        <div class="match-row" onclick="togglePanel(this)">
          <div class="team-cell home">${m.team_home}</div>
          <div class="centre-block">
            <div class="badge">${dateStr}</div>
            <div class="match-meta">${timeStr}</div>
          </div>
          <div class="team-cell away">${m.team_away}</div>
          <button class="expand-btn">▾</button>
        </div>
        <div class="predictions-panel">${predsHtml}</div>
      </div>`;
  });

  container.innerHTML = html;
}

// ── Update Predictions Only ───────
function updatePredictionsOnly(newMatches) {
  newMatches.forEach(m => {
    if (!m.predictions) return;

    Object.entries(m.predictions).forEach(([userId, pred]) => {
      const homeEl = document.getElementById(`pred-${m.match_id}-${userId}-home`);
      const awayEl = document.getElementById(`pred-${m.match_id}-${userId}-away`);

      if (homeEl && awayEl) {
        if (homeEl.value != pred.pred_home)
          homeEl.value = pred.pred_home ?? '';

        if (awayEl.value != pred.pred_away)
          awayEl.value = pred.pred_away ?? '';
      }
    });
  });

  // remove skeleton leftovers
  document.querySelectorAll('.skeleton').forEach(el => el.remove());
}

// ── UI ───────────────────────────
function togglePanel(row) {
  const panel = row.nextElementSibling;
  const btn = row.querySelector('.expand-btn');
  const open = panel.classList.toggle('open');
  btn.textContent = open ? '▴' : '▾';
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(s) {
  return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;') : '';
}

boot();
</script>

</body>

</html>
