<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://sparkling-frost-59a4.satyajeetking.workers.dev" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="award.png">
  <title>WC2026 Predictor</title>
  <style>
    :root {
      --paper: #f5f0e8;
      --paper2: #ede8df;
      --paper3: #e4ddd1;
      --ink: #0e0e0e;
      --ink2: #3a3730;
      --ink3: #45403a;
      --ink4: #6e6760;
      --green: #1a5c2a;
      --green-light: #e8f0ea;
      --green-mid: #c2d9c7;
      --red: #c0392b;
      --red-light: #fbecea;
      --gold: #b8860b;
      --gold-light: #fdf6e3;
      --blue: #1a3a6b;
      --rule: rgba(14,14,14,0.12);
      --rule-strong: rgba(14,14,14,0.25);
      --radius: 4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    header {
      background: var(--ink);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo { display: flex; align-items: baseline; gap: 10px; }

    .logo-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.45rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }
    .logo-main span { color: #5ddb7c; }

    .logo-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      padding-bottom: 2px;
    }

    .sync-btn {
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 7px 16px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
    }
    .sync-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
    .sync-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sync-icon { font-size: 0.85rem; display: inline-block; transition: transform 0.5s; }
    .sync-btn.spinning .sync-icon { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tabs-wrapper {
      background: var(--ink);
      position: sticky;
      top: 60px;
      z-index: 199;
      display: flex;
      padding: 0 28px;
    }

    .tab {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding: 13px 20px 11px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }
    .tab:hover { color: rgba(255,255,255,0.65); }
    .tab.active { color: #5ddb7c; border-bottom-color: #5ddb7c; }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 24px 100px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .stage-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 40px 0 16px;
    }
    .stage-header:first-child { margin-top: 0; }
    .stage-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink3);
      white-space: nowrap;
    }
    .stage-rule { flex: 1; height: 1px; background: var(--rule); }

    .match-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      margin-bottom: 6px;
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .match-card:hover { border-color: var(--rule-strong); box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

    .match-row {
      display: grid;
      grid-template-columns: 1fr 130px 1fr 52px;
      align-items: stretch;
      cursor: pointer;
      user-select: none;
      min-height: 72px;
    }

    .team-cell { display: flex; align-items: center; padding: 16px 20px; min-width: 0; overflow: hidden; }
    .team-cell.home { justify-content: flex-end; border-right: 1px solid var(--rule); }
    .team-cell.away { justify-content: flex-start; border-left: 1px solid var(--rule); }

    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1.1;
      color: var(--ink);
    }
    .team-cell.home .team-name { text-align: right; }

    .centre-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      gap: 5px;
      min-width: 0;
      overflow: hidden;
      background: var(--paper);
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .score-num { color: var(--ink); min-width: 26px; text-align: center; }
    .score-num.final { color: var(--green); }
    .score-num.pending { color: var(--ink3); font-size: 1.4rem; font-weight: 400; }
    .score-dash { color: var(--ink3); font-weight: 400; font-size: 1.6rem; padding: 0 2px; }

    .match-status { display: flex; flex-direction: column; align-items: center; gap: 2px; }

    .badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
    .badge.upcoming { background: var(--paper3); color: var(--ink2); }
    .badge.finished { background: var(--green-light); color: var(--green); }
    .badge.live { background: var(--red-light); color: var(--red); animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .match-time {
      font-family: 'Barlow', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink3);
      letter-spacing: 0.03em;
    }

    .expand-col { display: flex; align-items: center; padding: 0 14px; border-left: 1px solid var(--rule); }
    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink3);
      font-size: 0.85rem;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .expand-btn:hover { background: var(--paper2); color: var(--ink2); }

    .predictions-panel {
      display: none;
      border-top: 1px solid var(--rule);
      background: var(--paper);
      padding: 16px 20px;
    }
    .predictions-panel.open { display: block; }

    .pred-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }

    .pred-item {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .pred-item:hover { border-color: var(--rule-strong); }

    .pred-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pred-score-row { display: flex; align-items: center; gap: 6px; }

    .pred-input {
      width: 42px;
      height: 40px;
      background: var(--paper);
      border: 1px solid var(--rule-strong);
      border-radius: var(--radius);
      color: var(--ink);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      text-align: center;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -moz-appearance: textfield;
    }
    .pred-input::-webkit-outer-spin-button,
    .pred-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .pred-input:focus { border-color: var(--green); background: var(--green-light); }
    .pred-input:disabled { opacity: 0.4; cursor: not-allowed; background: transparent; border-color: transparent; }

    .pred-sep { color: var(--ink3); font-weight: 600; font-size: 0.9rem; }

    .points-pill {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
      align-self: flex-start;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .points-pill.p3 { background: var(--green-light); color: var(--green); }
    .points-pill.p1 { background: #e8eef8; color: var(--blue); }
    .points-pill.p0 { background: var(--red-light); color: var(--red); }
    .points-pill.pnd { background: var(--paper2); color: var(--ink4); }

    .lb-wrap {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .lb-title-row {
      padding: 20px 24px 16px;
      border-bottom: 2px solid var(--ink);
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .lb-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1;
    }
    .lb-sub {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink4);
    }

    .lb-header-row {
      display: grid;
      grid-template-columns: 56px 1fr 80px 56px 60px;
      padding: 8px 24px;
      background: var(--paper2);
      border-bottom: 1px solid var(--rule);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
    }
    .lb-header-row div:not(:first-child):not(:nth-child(2)) { text-align: center; }

    .lb-row {
      display: grid;
      grid-template-columns: 56px 1fr 80px 56px 60px;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--rule);
      transition: background 0.15s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--paper); }
    .lb-row.top1 { background: var(--gold-light); }
    .lb-row.top1:hover { background: #fdf2d0; }

    .rank-cell { display: flex; align-items: center; justify-content: center; }
    .rank-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      line-height: 1;
    }
    .rank-num.r1 { color: var(--gold); font-size: 1.6rem; }
    .rank-num.r2 { color: var(--ink2); }
    .rank-num.r3 { color: #a0522d; }
    .rank-num.rn { color: var(--ink3); font-size: 0.9rem; font-weight: 700; }

    .lb-name-cell { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .lb-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-row.top1 .lb-name { color: var(--gold); }

    .lb-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--green);
      text-align: center;
      line-height: 1;
    }
    .lb-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      color: var(--ink2);
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--paper2) 25%, var(--paper3) 50%, var(--paper2) 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.8s infinite linear;
      border-radius: 3px;
    }
    .skel-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      margin-bottom: 6px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 72px;
    }
    .sk-team { height: 16px; width: 100px; }
    .sk-score { height: 40px; width: 100px; border-radius: 3px; }
    .sk-meta { height: 10px; width: 70px; margin-top: 6px; }
    .sk-lb-row {
      display: grid;
      grid-template-columns: 56px 1fr 80px 56px 60px;
      align-items: center;
      padding: 14px 24px;
      gap: 8px;
      border-bottom: 1px solid var(--rule);
    }
    .sk-rank { height: 22px; width: 28px; margin: 0 auto; }
    .sk-name { height: 16px; width: 140px; }
    .sk-pts { height: 22px; width: 44px; margin: 0 auto; }
    .sk-stat { height: 14px; width: 28px; margin: 0 auto; }

    .state-msg {
      text-align: center;
      color: var(--ink3);
      padding: 60px 20px;
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--ink);
      color: #fff;
      border-left: 3px solid #5ddb7c;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      white-space: nowrap;
    }
    .toast.error { border-left-color: var(--red); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 560px) {
      .header-top { padding: 0 16px; height: 54px; }
      .logo-main { font-size: 1.2rem; }
      .tabs-wrapper { padding: 0 16px; top: 54px; }
      .tab { padding: 11px 14px 9px; font-size: 0.78rem; }
      main { padding: 24px 14px 100px; }
      .team-name { font-size: 0.9rem; max-width: 100%; }
      .team-cell { padding: 12px 12px; }
      .match-row { grid-template-columns: 1fr 106px 1fr 44px; }
      .centre-block { min-width: 0; padding: 10px 6px; }
      .score-display { font-size: 1.6rem; }
      .sync-btn .btn-label { display: none; }
      .lb-header-row, .lb-row { grid-template-columns: 44px 1fr 64px 44px 48px; padding: 12px 14px; }
      .lb-pts { font-size: 1.2rem; }
      .lb-name { font-size: 0.9rem; }
      .sk-lb-row { grid-template-columns: 44px 1fr 64px 44px 48px; padding: 12px 14px; }
      .pred-grid { grid-template-columns: 1fr 1fr; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #matchList .match-card { animation: slideUp 0.38s ease both; }
    #matchList .match-card:nth-child(2) { animation-delay: 0.05s; }
    #matchList .match-card:nth-child(3) { animation-delay: 0.1s; }
    #matchList .match-card:nth-child(4) { animation-delay: 0.15s; }
    #matchList .match-card:nth-child(5) { animation-delay: 0.2s; }
    #matchList .match-card:nth-child(6) { animation-delay: 0.25s; }
    .lb-wrap { animation: slideUp 0.35s ease both; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-main">WC<span>2026</span></div>
      <div class="logo-sub">Predictor</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="syncAll()">
      <span class="sync-icon">↻</span>
      <span class="btn-label">Sync Scores</span>
    </button>
  </div>
</header>

<div class="tabs-wrapper">
  <div class="tab active" onclick="switchTab('predict', this)">Predict</div>
  <div class="tab" onclick="switchTab('leaderboard', this)">Leaderboard</div>
</div>

<main>
  <div id="predict" class="tab-content active">
    <div id="matchList"><div class="state-msg">Loading matches…</div></div>
  </div>
  <div id="leaderboard" class="tab-content">
    <div id="lbList"><div class="state-msg">Loading leaderboard…</div></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://sparkling-frost-59a4.satyajeetking.workers.dev';
  const STAGE_LABEL = {
    group:'Group Stage', r32:'Round of 32', r16:'Round of 16',
    qf:'Quarter Finals', sf:'Semi Finals', third:'Third Place', final:'Final',
  };
  const predBuffer = {};
  let matches = [], users = [];
  let toastTimer;

  const CACHE_TTL = 30 * 1000;
  function cachePaint(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      const p = JSON.parse(raw);
      if (p?.data && p?.ts && Date.now() - p.ts < CACHE_TTL) return p.data;
      return null;
    } catch { return null; }
  }
  function cacheSave(key, data) {
    try { localStorage.setItem(key, JSON.stringify({ data, ts: Date.now() })); } catch {}
  }

  function renderSkeleton() {
    const cards = Array.from({ length: 5 }, () => `
      <div class="skel-card">
        <div class="skel sk-team"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div class="skel sk-score"></div>
          <div class="skel sk-meta"></div>
        </div>
        <div class="skel sk-team"></div>
      </div>`).join('');
    document.getElementById('matchList').innerHTML =
      '<div class="stage-header"><div class="stage-rule"></div></div>' + cards;
  }

  function renderLBSkeleton() {
    const rows = Array.from({ length: 7 }, () => `
      <div class="sk-lb-row">
        <div class="skel sk-rank"></div>
        <div class="skel sk-name"></div>
        <div class="skel sk-pts"></div>
        <div class="skel sk-stat"></div>
        <div class="skel sk-stat"></div>
      </div>`).join('');
    document.getElementById('lbList').innerHTML = `
      <div class="lb-wrap">
        <div class="lb-title-row"><div class="lb-title">Standings</div></div>
        <div class="lb-header-row">
          <div></div><div>Player</div>
          <div>Pts</div><div>Exact</div><div>Result</div>
        </div>${rows}
      </div>`;
  }

  async function boot() {
    const pu = cachePaint('wc2026_users'), pm = cachePaint('wc2026_matches');
    const hasCache = Array.isArray(pu) && pu.length && Array.isArray(pm) && pm.length;
    if (hasCache) { users = pu; matches = pm; sortUsers(); renderMatches(); }
    else renderSkeleton();
    try {
      const [mu, mm] = await Promise.all([
        fetch(API + '/users').then(r => r.json()),
        fetch(API + '/matches').then(r => r.json()),
      ]);
      cacheSave('wc2026_users', mu); cacheSave('wc2026_matches', mm);
      if (JSON.stringify(mu) !== JSON.stringify(users) || JSON.stringify(mm) !== JSON.stringify(matches)) {
        users = mu; matches = mm; sortUsers(); renderMatches();
      }
    } catch {
      if (!hasCache) {
        document.getElementById('matchList').innerHTML = `<div class="state-msg">Could not load data.</div>`;
        showToast('Failed to load', true);
      }
    }
  }

  let lastVisible = Date.now();
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { lastVisible = Date.now(); }
    else if (Date.now() - lastVisible > 5 * 60 * 1000) {
      ['wc2026_users','wc2026_matches','wc2026_leaderboard'].forEach(k => localStorage.removeItem(k));
      boot();
    }
  });

  function sortUsers() {
    users.sort((a, b) => (a.display_name||'').localeCompare(b.display_name||''));
  }

  function parseUTC(str) {
    if (!str) return null;
    if (!str.endsWith('Z') && !str.includes('+') && !str.match(/[+-]\d{2}:\d{2}$/)) str += 'Z';
    return new Date(str);
  }
  const fmtDate = dt => dt.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', timeZone:'Asia/Kolkata' });
  const fmtTime = dt => dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true, timeZone:'Asia/Kolkata' }).toUpperCase() + ' IST';

  function switchTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if (id === 'leaderboard') renderLeaderboard();
  }

  function renderMatches() {
    const container = document.getElementById('matchList');
    if (!matches.length) { container.innerHTML = '<div class="state-msg">No matches yet.</div>'; return; }
    let html = '', lastStage = null;
    matches.forEach(m => {
      if (m.stage !== lastStage) {
        html += `<div class="stage-header"><div class="stage-label">${STAGE_LABEL[m.stage]||m.stage}</div><div class="stage-rule"></div></div>`;
        lastStage = m.stage;
      }
      const finished = m.status === 'FINISHED';
      const kickoffDt = parseUTC(m.kickoff);
      const lockTime = kickoffDt ? new Date(kickoffDt.getTime() + 3600000) : null;
      const locked = finished || (lockTime && new Date() >= lockTime);
      const homeTeam = m.team_home || 'TBD', awayTeam = m.team_away || 'TBD';
      const sh = finished ? `<span class="score-num final">${m.score_home}</span>` : `<span class="score-num pending">–</span>`;
      const sa = finished ? `<span class="score-num final">${m.score_away}</span>` : `<span class="score-num pending">–</span>`;
      const badgeCls = finished ? 'finished' : 'upcoming';
      const badgeTxt = finished ? 'Full Time' : (kickoffDt ? fmtDate(kickoffDt) : '—');
      const timeStr = kickoffDt ? fmtTime(kickoffDt) : '';

      let predsHtml = '';
      if (users.length) {
        predsHtml = '<div class="pred-grid">';
        users.forEach(u => {
          const pred = (m.predictions||{})[u.user_id];
          const ph = pred != null ? pred.pred_home : '';
          const pa = pred != null ? pred.pred_away : '';
          const pts = pred ? pred.points : null;
          let pill = '<div class="points-pill pnd">Pending</div>';
          if (finished) {
            if (!pred) pill = '<div class="points-pill p0">No pick</div>';
            else if (pts===3) pill = '<div class="points-pill p3">+3 Exact</div>';
            else if (pts===1) pill = '<div class="points-pill p1">+1 Result</div>';
            else pill = '<div class="points-pill p0">+0 Miss</div>';
          }
          const dis = locked ? 'disabled' : '';
          predsHtml += `
            <div class="pred-item">
              <div class="pred-name">${escHtml(u.display_name)}</div>
              <div class="pred-score-row">
                <input class="pred-input" type="number" min="0" max="20" placeholder="–" value="${ph}" ${dis}
                  onblur="savePred(this,'${m.match_id}','${u.user_id}','home')" />
                <span class="pred-sep">–</span>
                <input class="pred-input" type="number" min="0" max="20" placeholder="–" value="${pa}" ${dis}
                  onblur="savePred(this,'${m.match_id}','${u.user_id}','away')" />
              </div>
              ${pill}
            </div>`;
        });
        predsHtml += '</div>';
      } else {
        predsHtml = '<div style="color:var(--ink4);font-family:\'Instrument Serif\',serif;font-style:italic;font-size:0.9rem;">No players added yet.</div>';
      }

      html += `
        <div class="match-card">
          <div class="match-row" onclick="togglePanel(this)">
            <div class="team-cell home"><div class="team-name">${escHtml(homeTeam)}</div></div>
            <div class="centre-block">
              <div class="score-display">${sh}<span class="score-dash">·</span>${sa}</div>
              <div class="match-status">
                <div class="badge ${badgeCls}">${badgeTxt}</div>
                <div class="match-time">${timeStr}</div>
              </div>
            </div>
            <div class="team-cell away"><div class="team-name">${escHtml(awayTeam)}</div></div>
            <div class="expand-col">
              <button class="expand-btn" aria-label="Show predictions">▾</button>
            </div>
          </div>
          <div class="predictions-panel">${predsHtml}</div>
        </div>`;
    });
    container.innerHTML = html;
  }

  function renderLeaderboard() {
    const container = document.getElementById('lbList');
    const cached = cachePaint('wc2026_leaderboard');
    if (cached?.length) renderLBData(cached); else renderLBSkeleton();
    fetch(API + '/leaderboard').then(r => r.json()).then(data => {
      cacheSave('wc2026_leaderboard', data); renderLBData(data);
    }).catch(() => { if (!cached) container.innerHTML = '<div class="state-msg">Could not load leaderboard.</div>'; });
  }

  function renderLBData(data) {
    if (!data.length) { document.getElementById('lbList').innerHTML = '<div class="state-msg">No players yet.</div>'; return; }
    data.sort((a, b) => b.total_points !== a.total_points ? b.total_points - a.total_points : a.display_name.localeCompare(b.display_name));
    const medals = ['🥇','🥈','🥉'];
    const rcls = i => i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const rowcls = i => i===0?'top1':i===1?'top2':i===2?'top3':'';
    let html = `
      <div class="lb-wrap">
        <div class="lb-title-row">
          <div class="lb-title">Standings</div>
          <div class="lb-sub">${data.length} players competing since 2018</div>
        </div>
        <div class="lb-header-row">
          <div></div><div>Player</div>
          <div>Pts</div><div>Exact</div><div>Result</div>
        </div>`;
    data.forEach((u, i) => {
      html += `
        <div class="lb-row ${rowcls(i)}">
          <div class="rank-cell"><span class="rank-num ${rcls(i)}">${i < 3 ? medals[i] : i+1}</span></div>
          <div class="lb-name-cell"><div class="lb-name">${escHtml(u.display_name)}</div></div>
          <div class="lb-pts">${u.total_points??0}</div>
          <div class="lb-num">${u.exact??'—'}</div>
          <div class="lb-num">${u.correct??'—'}</div>
        </div>`;
    });
    html += '</div>';
    document.getElementById('lbList').innerHTML = html;
  }

  function togglePanel(row) {
    const panel = row.nextElementSibling;
    const btn = row.querySelector('.expand-btn');
    if (!panel) return;
    const open = panel.classList.toggle('open');
    btn.textContent = open ? '▴' : '▾';
  }

  const timers = {};
  function savePred(input, matchId, userId, side) {
    const val = input.value.trim();
    if (val === '') return;
    const key = `${matchId}__${userId}`;
    if (!predBuffer[key]) {
      const [hi, ai] = input.closest('.pred-item').querySelectorAll('.pred-input');
      predBuffer[key] = {
        home: hi.value.trim() !== '' ? parseInt(hi.value,10) : null,
        away: ai.value.trim() !== '' ? parseInt(ai.value,10) : null,
      };
    }
    predBuffer[key][side] = parseInt(val, 10);
    if (timers[key]) clearTimeout(timers[key]);
    timers[key] = setTimeout(() => {
      const buf = predBuffer[key];
      if (buf.home === null || buf.away === null) return;
      showToast('Saving…');
      fetch(API + '/predictions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, match_id: matchId, pred_home: buf.home, pred_away: buf.away }),
      }).then(r => r.json()).then(d => {
        if (d.status === 'saved') showToast('Saved');
        else showToast(d.error || 'Error saving', true);
      }).catch(() => showToast('Network error', true));
    }, 50);
  }

  async function syncAll() {
    const btn = document.getElementById('syncBtn');
    btn.disabled = true;
    btn.classList.add('spinning');
    btn.querySelector('.btn-label') && (btn.querySelector('.btn-label').textContent = ' Syncing…');
    try {
      const data = await fetch(API + '/sync', { method: 'POST' }).then(r => r.json());
      showToast(`Synced ${data.count} match${data.count!==1?'es':''}`);
      const [mu, mm] = await Promise.all([
        fetch(API + '/users').then(r => r.json()),
        fetch(API + '/matches').then(r => r.json()),
      ]);
      users = mu; matches = mm; sortUsers();
      cacheSave('wc2026_users', mu); cacheSave('wc2026_matches', mm);
      localStorage.removeItem('wc2026_leaderboard');
      renderMatches();
      if (document.getElementById('leaderboard').classList.contains('active')) renderLeaderboard();
    } catch { showToast('Sync failed', true); }
    finally {
      btn.disabled = false;
      btn.classList.remove('spinning');
      const lbl = btn.querySelector('.btn-label');
      if (lbl) lbl.textContent = ' Sync Scores';
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError?' error':'') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  boot();
</script>
</body>
</html>
